name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: 'Update baseline screenshots'
        type: boolean
        default: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install chromium --with-deps
      - name: Update Snapshots
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        run: npx playwright test tests/integration --update-snapshots
      - name: Commit updated snapshots
        if: ${{ github.event.inputs.update_snapshots == 'true' }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tests/integration/*.spec.ts-snapshots/
          git diff --staged --quiet || git commit -m "update linux baseline screenshots"
          git push
      - name: Run Playwright tests
        run: npx playwright test tests/component tests/integration
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30